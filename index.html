<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>PursePal — Expense Tracker</title>
    
    <!-- PWA + iPhone Home Screen Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='22'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-weight='bold'%3E💰%3C/text%3E%3C/svg%3E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PursePal">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f2f2f7" id="themeColorMeta">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22PursePal%22,%22short_name%22:%22PursePal%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f2f2f7%22,%22theme_color%22:%22%233b82f6%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6' rx='22'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-weight='bold'%3E💰%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        input, textarea, select, button {
            font-size: 16px;
        }

        body {
            font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, Helvetica, sans-serif;
            padding: 20px 14px 90px;
            transition: background 0.2s ease, color 0.2s ease;
            min-height: 100vh;
        }

        /* ========== LIGHT THEME ========== */
        body.light {
            background: #f2f2f7;
            color: #1c1c1e;
        }
        body.light .card,
        body.light .daily-card,
        body.light .modal-card {
            background: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
        }
        body.light .day-cell {
            background: #ffffff;
            border: 0.5px solid #e9ecef;
        }
        body.light .day-cell.selected-day {
            background: #dbeafe;
            border: 2px solid #3b82f6;
        }
        body.light .stat-card {
            background: #ffffff;
            border: 0.5px solid #e9ecef;
        }
        body.light .expense-item {
            background: #ffffff;
            border: 0.5px solid #e9ecef;
        }
        body.light .current-month,
        body.light .year-nav {
            background: #eef2ff;
        }
        body.light .nav-btn {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        body.light .theme-selector,
        body.light .tabs,
        body.light .currency-selector {
            background: rgba(255,255,255,0.8);
        }
        body.light .tab-btn.active {
            background: #3b82f6;
            color: white;
        }
        body.light .btn-primary {
            background: #3b82f6;
        }
        body.light .fab {
            background: #3b82f6;
        }
        body.light .delete-expense {
            color: #ff3b30;
        }
        /* Light theme expense amount - RED for visibility */
        body.light .expense-amount {
            background: #fee2e2;
            color: #dc2626;
            font-weight: 700;
        }

        /* ========== DARK THEME ========== */
        body.dark {
            background: #0a0a0e;
            color: #ffffff;
        }
        body.dark .card,
        body.dark .daily-card,
        body.dark .modal-card {
            background: #1c1c24;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            border: 0.5px solid #2c2c34;
        }
        body.dark .day-cell {
            background: #1c1c24;
            border: 0.5px solid #2c2c34;
            color: #e2e2e8;
        }
        body.dark .day-cell.other-month {
            background: #14141a;
            opacity: 0.7;
        }
        body.dark .day-cell.selected-day {
            background: #2c4f8c;
            border: 2px solid #3b82f6;
        }
        body.dark .day-cell.selected-day .day-number,
        body.dark .day-cell.selected-day .day-amount {
            color: white;
        }
        body.dark .day-amount {
            background: #3a1212;
            color: #ff6b6b;
        }
        body.dark .stat-card {
            background: #1c1c24;
            border: 0.5px solid #2c2c34;
            color: #ffffff;
        }
        body.dark .stat-label {
            color: #8e8e98;
        }
        body.dark .expense-item {
            background: #1c1c24;
            border: 0.5px solid #2c2c34;
        }
        /* Dark theme expense amount - BRIGHT RED for visibility */
        body.dark .expense-amount {
            background: #3a1212;
            color: #ff6b6b;
            font-weight: 700;
        }
        body.dark .current-month {
            background: #2c2c34;
            color: #ffffff;
        }
        body.dark .year-nav {
            background: #2c2c34;
        }
        body.dark .year-nav span,
        body.dark .year-nav button {
            color: #ffffff;
        }
        body.dark .nav-btn {
            background: #2c2c34;
            color: #ffffff;
            box-shadow: none;
        }
        body.dark .theme-selector,
        body.dark .tabs,
        body.dark .currency-selector {
            background: rgba(28,28,36,0.9);
        }
        body.dark .tab-btn {
            color: #8e8e98;
        }
        body.dark .tab-btn.active {
            background: #3b82f6;
            color: white;
        }
        body.dark .theme-btn.active-theme,
        body.dark .currency-btn.active-currency {
            background: #3b82f6;
            color: white;
        }
        body.dark .btn-primary {
            background: #3b82f6;
            color: white;
        }
        body.dark .btn-secondary {
            background: #2c2c34;
            color: #e2e2e8;
        }
        body.dark .fab {
            background: #3b82f6;
            color: white;
        }
        body.dark .delete-expense {
            color: #ff453a;
        }
        body.dark .insight-badge {
            background: #1c1c24;
            border: 0.5px solid #2c2c34;
            color: #e2e2e8;
        }
        body.dark #monthlyBreakdown {
            background: #1c1c24 !important;
        }
        body.dark #monthlyBreakdown span {
            background: #2c2c34 !important;
            color: #e2e2e8;
        }
        body.dark .modal-card input {
            background: #2c2c34;
            border-color: #3a3a42;
            color: white;
        }
        body.dark .numpad button {
            background: #2c2c34;
            color: white;
        }
        body.dark .numpad button:active {
            background: #3a3a42;
        }
        body.dark .daily-header {
            border-bottom-color: #2c2c34;
        }

        .app-container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .left-controls {
            display: flex;
            gap: 8px;
            flex: 1;
        }
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 4px;
            border-radius: 60px;
            flex: 1;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 50px;
            font-weight: 590;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .right-controls {
            display: flex;
            gap: 6px;
        }
        .theme-selector, .currency-selector {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            padding: 4px 6px;
            border-radius: 60px;
        }
        .theme-btn, .currency-btn {
            background: transparent;
            border: none;
            padding: 6px 10px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .theme-btn.active-theme, .currency-btn.active-currency {
            background: #3b82f6;
            color: white;
        }

        /* Panels */
        .panel { display: none; animation: fadeIn 0.25s ease; }
        .panel.active-panel { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px);} to { opacity:1; transform:translateY(0);} }

        /* Cards */
        .card, .daily-card {
            border-radius: 28px;
            padding: 20px 18px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        /* Month header */
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .nav-group {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .current-month {
            font-weight: 590;
            font-size: 1.25rem;
            padding: 8px 24px;
            border-radius: 60px;
        }

        /* Calendar */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: #8e8e93;
        }
        .calendar-grid { display: flex; flex-direction: column; gap: 8px; }
        .week-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell {
            border-radius: 20px;
            padding: 10px 4px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.12s;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .day-number { font-weight: 600; font-size: 1rem; }
        .day-amount {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 30px;
            margin-top: 4px;
        }

        /* Expense list */
        .daily-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-weight: 590;
            border-bottom: 0.5px solid #c6c6c8;
        }
        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        .delete-expense-btn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s;
            color: #ff3b30;
        }
        .delete-expense-btn:active { opacity: 0.6; transform: scale(0.95); }
        
        /* Global expense amount style - RED for visibility */
        .expense-amount {
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 700;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            border-radius: 24px;
            padding: 12px 6px;
            text-align: center;
        }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .stat-value { font-size: 1.35rem; font-weight: 650; margin-top: 4px; }
        .year-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 6px 18px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .year-nav button {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .insight-badge {
            border-radius: 24px;
            padding: 12px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.8rem;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-card {
            width: 90%;
            max-width: 400px;
            border-radius: 44px;
            padding: 24px 22px 28px;
            text-align: center;
        }
        .modal-card h3 { font-size: 1.6rem; margin-bottom: 16px; font-weight: 590; }
        .modal-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 44px;
            border: 0.5px solid #c6c6c8;
            font-size: 1rem;
            margin: 8px 0;
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0;
        }
        .numpad button {
            border: none;
            padding: 16px 0;
            font-size: 1.5rem;
            font-weight: 500;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.05s;
        }
        .numpad button:active { transform: scale(0.96); }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin: 12px 0 4px;
        }
        .btn-primary, .btn-secondary {
            padding: 14px;
            font-size: 1rem;
            font-weight: 590;
            border: none;
            border-radius: 44px;
            flex: 1;
            cursor: pointer;
        }
        .fab {
            position: fixed;
            bottom: 24px;
            right: 20px;
            width: 62px;
            height: 62px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            border: none;
            box-shadow: 0 4px 16px rgba(59,130,246,0.4);
            cursor: pointer;
            z-index: 10;
            transition: 0.1s;
        }
        .fab:active { transform: scale(0.94); }
        .small-note { font-size: 0.65rem; margin-top: 8px; opacity: 0.6; }
    </style>
</head>
<body class="light">
<div class="app-container">
    <div class="top-bar">

<button class="fab" id="openAddBtn">+</button>

<!-- Modal -->

    <div class="modal-card">
        <h3 id="modalTitle">➕ Add Expense</h3>
        <input type="text" id="expenseDesc" placeholder="Description (Coffee, Rent...)" autocomplete="off">
        <input type="text" id="expenseAmountInput" placeholder="0.00" readonly style="font-size:1.4rem; text-align:center; font-weight:500;">
        <div class="numpad" id="numpadContainer"></div>
        <div class="modal-buttons">
            <button class="btn-primary" id="saveExpenseBtn">✓ Save</button>
            <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
        </div>
        <button class="close-icon" id="closeModalBtn" style="background:none; border:none; margin-top:6px; font-size:0.85rem; opacity:0.6; cursor:pointer;">✕ Close without adding</button>
    </div>
</div>

<script>
    // ---------- STORAGE ----------
    const STORAGE_KEY = 'pursepal_expenses_final_v2';
    const CURRENCY_KEY = 'pursepal_currency';
    const THEME_KEY = 'pursepal_theme';
    
    let expenses = [];
    let currentCurrency = 'EUR';
    let currentTheme = 'light';

    function loadExpenses() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if(stored) { 
            try { 
                expenses = JSON.parse(stored); 
                if(!Array.isArray(expenses)) expenses = []; 
            } catch(e) { expenses = []; }
        } else { 
            expenses = [];
        }
    }
    
    function saveExpenses() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses)); 
    }
    
    function loadCurrency() {
        const saved = localStorage.getItem(CURRENCY_KEY);
        if(saved === 'EUR' || saved === 'USD') currentCurrency = saved;
        else currentCurrency = 'EUR';
        updateCurrencyUI();
    }
    
    function setCurrency(currency) {
        currentCurrency = currency;
        localStorage.setItem(CURRENCY_KEY, currency);
        updateCurrencyUI();
        refreshAllDisplays();
    }
    
    function getCurrencySymbol() { return currentCurrency === 'EUR' ? '€' : '$'; }
    
    function updateCurrencyUI() {
        document.querySelectorAll('.currency-btn').forEach(btn => {
            if(btn.getAttribute('data-currency') === currentCurrency) btn.classList.add('active-currency');
            else btn.classList.remove('active-currency');
        });
        document.getElementById('modalTitle').innerHTML = `➕ Add Expense (${getCurrencySymbol()})`;
    }
    
    function formatMoney(amount) { return `${getCurrencySymbol()}${amount.toFixed(2)}`; }

    function getExpensesForDate(dateStr) { return expenses.filter(e => e.dateStr === dateStr); }
    function getTotalForDate(dateStr) { return getExpensesForDate(dateStr).reduce((s,e)=>s+e.amount,0); }

    function addExpense(description, amount, dateStr) {
        if(!description.trim()) description = "Expense";
        if(isNaN(amount) || amount <= 0) return false;
        const newExpense = { 
            id: Date.now(), 
            dateStr: dateStr, 
            description: description.trim().substring(0,48), 
            amount: parseFloat(amount) 
        };
        expenses.push(newExpense);
        saveExpenses();
        return true;
    }
    
    // DELETE FUNCTION - properly removes expense and triggers UI refresh
    function deleteExpenseById(id) {
        const newExpenses = expenses.filter(e => e.id !== id);
        if (newExpenses.length !== expenses.length) {
            expenses = newExpenses;
            saveExpenses();
            refreshAllDisplays();
            return true;
        }
        return false;
    }

    let currentDisplayDate = new Date();
    let selectedDateStr = new Date().toISOString().slice(0,10);
    let statsYear = new Date().getFullYear();

    function getMonthCalendar(year, month) {
        const firstDay = new Date(year, month, 1);
        let startWeekday = firstDay.getDay();
        let offset = (startWeekday === 0 ? 6 : startWeekday - 1);
        const startDate = new Date(year, month, 1);
        startDate.setDate(1 - offset);
        let weeks = [];
        let current = new Date(startDate);
        for(let w=0; w<6; w++) {
            let week = [];
            for(let i=0;i<7;i++) {
                let dateObj = new Date(current);
                let dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
                let amount = getTotalForDate(dateStr);
                week.push({ dateObj, dateStr, amount, isCurrentMonth: dateObj.getMonth() === month });
                current.setDate(current.getDate()+1);
            }
            weeks.push(week);
            if(week[6].dateObj.getMonth() !== month && week[6].dateObj.getDate() > 7) break;
        }
        return weeks;
    }

    function renderCalendar() {
        const year = currentDisplayDate.getFullYear();
        const month = currentDisplayDate.getMonth();
        const weeks = getMonthCalendar(year, month);
        const container = document.getElementById('calendarGrid');
        container.innerHTML = '';
        const symbol = getCurrencySymbol();
        for(let week of weeks) {
            const row = document.createElement('div'); row.className = 'week-row';
            for(let day of week) {
                const cell = document.createElement('div');
                cell.className = `day-cell ${!day.isCurrentMonth ? 'other-month' : ''} ${selectedDateStr === day.dateStr ? 'selected-day' : ''}`;
                const amtFmt = day.amount > 0 ? `${symbol}${day.amount.toFixed(1)}` : '';
                cell.innerHTML = `<div class="day-number">${day.dateObj.getDate()}</div>${amtFmt ? `<div class="day-amount">${amtFmt}</div>` : ''}`;
                cell.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    selectedDateStr = day.dateStr; 
                    renderCalendar(); 
                    renderDailyView(); 
                });
                row.appendChild(cell);
            }
            container.appendChild(row);
        }
        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        document.getElementById('currentMonthLabel').innerHTML = `${monthNames[month]} ${year}`;
    }

    function renderDailyView() {
        const exps = getExpensesForDate(selectedDateStr);
        const total = exps.reduce((s,e)=>s+e.amount,0);
        document.getElementById('dailyTotalSpan').innerHTML = formatMoney(total);
        const title = selectedDateStr === new Date().toISOString().slice(0,10) ? `📆 Today · ${selectedDateStr}` : `📅 ${selectedDateStr}`;
        document.getElementById('selectedDateTitle').innerText = title;
        const container = document.getElementById('expensesListContainer');
        if(exps.length === 0) { 
            container.innerHTML = `<div style="text-align:center; padding:24px; opacity:0.6;">💸 No expenses. Tap + to add.</div>`; 
            return; 
        }
        container.innerHTML = '';
        const symbol = getCurrencySymbol();
        
        // Create each expense item with RED expense amount for visibility
        exps.forEach(exp => {
            const div = document.createElement('div'); 
            div.className = 'expense-item';
            div.style.marginBottom = '8px';
            div.innerHTML = `
                <span style="font-weight:500;">${escapeHtml(exp.description)}</span>
                <div style="display:flex;gap:12px;align-items:center;">
                    <span class="expense-amount">${symbol}${exp.amount.toFixed(2)}</span>
                    <button class="delete-expense-btn" data-id="${exp.id}">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });
        
        // Attach delete event listeners
        const deleteButtons = document.querySelectorAll('.delete-expense-btn');
        deleteButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const expenseId = parseInt(btn.getAttribute('data-id'));
                deleteExpenseById(expenseId);
            });
        });
    }

    function computeAdvancedStats(year) {
        const yearExps = expenses.filter(e => parseInt(e.dateStr.split('-')[0]) === year);
        if(yearExps.length === 0) return { yearTotal:0, monthlyAvg:0, bestMonth:'-', worstMonth:'-', highestDayAmount:0, highestDayStr:'', avgPerDay:0, totalEntries:0, activeDays:0, biggestExpenseAmt:0, avgPerEntry:0, monthlyTotals:{} };
        let monthlyTotals = {}, dayTotals = {};
        let biggestExpenseAmt = 0;
        for(let exp of yearExps) {
            let month = exp.dateStr.slice(0,7);
            monthlyTotals[month] = (monthlyTotals[month] || 0) + exp.amount;
            dayTotals[exp.dateStr] = (dayTotals[exp.dateStr] || 0) + exp.amount;
            if(exp.amount > biggestExpenseAmt) biggestExpenseAmt = exp.amount;
        }
        let monthEntries = Object.entries(monthlyTotals);
        let best = monthEntries.length ? monthEntries.reduce((a,b)=> a[1]>b[1] ? a:b, ['',0]) : null;
        let worst = monthEntries.length ? monthEntries.reduce((a,b)=> a[1]<b[1] ? a:b, ['',999999]) : null;
        let highestDay = Object.entries(dayTotals).reduce((a,b)=> a[1]>b[1] ? a:b, ['',0]);
        let yearTotal = yearExps.reduce((s,e)=>s+e.amount,0);
        let activeDays = Object.keys(dayTotals).length;
        let avgPerDay = activeDays ? yearTotal/activeDays : 0;
        let monthlyAvg = monthEntries.length ? yearTotal/monthEntries.length : 0;
        let avgPerEntry = yearExps.length ? yearTotal/yearExps.length : 0;
        return { yearTotal, monthlyAvg, bestMonth: best ? `${best[0]} (${formatMoney(best[1])})` : '-', worstMonth: worst ? `${worst[0]} (${formatMoney(worst[1])})` : '-', highestDayAmount: highestDay[1], highestDayStr: highestDay[0], avgPerDay, totalEntries: yearExps.length, activeDays, biggestExpenseAmt, avgPerEntry, monthlyTotals };
    }

    function refreshAllDisplays() { 
        renderCalendar(); 
        renderDailyView(); 
        renderStats(); 
    }

    function renderStats() {
        const stats = computeAdvancedStats(statsYear);
        const symbol = getCurrencySymbol();
        document.getElementById('yearTotal').innerHTML = `${symbol}${stats.yearTotal.toFixed(2)}`;
        document.getElementById('monthlyAvg').innerHTML = `${symbol}${stats.monthlyAvg.toFixed(2)}`;
        document.getElementById('bestMonth').innerHTML = stats.bestMonth;
        document.getElementById('worstMonth').innerHTML = stats.worstMonth;
        document.getElementById('highestDay').innerHTML = stats.highestDayAmount > 0 ? `${symbol}${stats.highestDayAmount.toFixed(2)}<span style="font-size:0.55rem;"> (${stats.highestDayStr})</span>` : `${symbol}0`;
        document.getElementById('avgDayStat').innerHTML = `${symbol}${stats.avgPerDay.toFixed(2)}`;
        document.getElementById('totalEntriesStat').innerHTML = stats.totalEntries;
        document.getElementById('activeDaysStat').innerHTML = stats.activeDays;
        document.getElementById('biggestExpense').innerHTML = `${symbol}${stats.biggestExpenseAmt.toFixed(2)}`;
        document.getElementById('avgPerEntry').innerHTML = `${symbol}${stats.avgPerEntry.toFixed(2)}`;
        document.getElementById('statsYearLabel').innerText = statsYear;
        let monthsOrder = ['01','02','03','04','05','06','07','08','09','10','11','12'];
        let html = `<div style="font-weight:590; margin-bottom:10px; font-size:0.85rem;">📅 Monthly spending (${statsYear})</div><div style="display:flex; flex-wrap:wrap; gap:6px;">`;
        for(let m of monthsOrder) {
            let key = `${statsYear}-${m}`;
            let total = stats.monthlyTotals[key] || 0;
            let short = new Date(statsYear, parseInt(m)-1,1).toLocaleString('default',{month:'short'});
            html += `<span style="padding:5px 12px; border-radius:30px; font-size:0.75rem;">${short}: ${symbol}${total.toFixed(2)}</span>`;
        }
        html += `</div>`;
        document.getElementById('monthlyBreakdown').innerHTML = html;
        document.getElementById('insightMessage').innerHTML = stats.totalEntries ? `✨ You spent ${symbol}${stats.yearTotal.toFixed(2)} in ${statsYear}. Avg ${symbol}${stats.avgPerDay.toFixed(2)}/day.` : `✨ Add expenses to see insights.`;
    }

    // Modal + Numpad
    let currentAmountStr = "";
    const amountInputField = document.getElementById('expenseAmountInput');
    function buildNumpad() {
        const pad = document.getElementById('numpadContainer');
        pad.innerHTML = '';
        ['7','8','9','4','5','6','1','2','3','0','.', '⌫'].forEach(btn => {
            const b = document.createElement('button');
            b.innerText = btn;
            b.addEventListener('click', () => {
                if(btn === '⌫') currentAmountStr = currentAmountStr.slice(0,-1);
                else if(btn === '.') { if(!currentAmountStr.includes('.')) currentAmountStr += '.'; }
                else currentAmountStr += btn;
                if(currentAmountStr === '') amountInputField.value = '';
                else if(currentAmountStr === '.') amountInputField.value = '0.';
                else amountInputField.value = currentAmountStr;
            });
            pad.appendChild(b);
        });
    }
    const modal = document.getElementById('expenseModal');
    function openModal() { modal.classList.add('active'); document.getElementById('expenseDesc').value = ''; currentAmountStr = ''; amountInputField.value = ''; buildNumpad(); }
    function closeModal() { modal.classList.remove('active'); }
    function handleSave() {
        let desc = document.getElementById('expenseDesc').value.trim();
        if(!desc) desc = "Expense";
        let amountVal = parseFloat(amountInputField.value);
        if(isNaN(amountVal) || amountVal <= 0) { alert("Enter amount using numpad > 0"); return; }
        addExpense(desc, amountVal, selectedDateStr);
        closeModal();
        refreshAllDisplays();
    }

    // Theme System
    function setTheme(theme) {
        currentTheme = theme;
        document.body.className = theme;
        localStorage.setItem(THEME_KEY, theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
            if(btn.getAttribute('data-theme') === theme) btn.classList.add('active-theme');
            else btn.classList.remove('active-theme');
        });
        const metaTheme = document.getElementById('themeColorMeta');
        if(theme === 'dark') metaTheme.setAttribute('content', '#0a0a0e');
        else metaTheme.setAttribute('content', '#f2f2f7');
    }
    
    function loadTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        if(saved === 'light' || saved === 'dark') setTheme(saved);
        else setTheme('light');
    }

    // Event Listeners
    document.getElementById('prevMonthBtn').addEventListener('click', () => { currentDisplayDate.setMonth(currentDisplayDate.getMonth()-1); refreshAllDisplays(); });
    document.getElementById('nextMonthBtn').addEventListener('click', () => { currentDisplayDate.setMonth(currentDisplayDate.getMonth()+1); refreshAllDisplays(); });
    document.getElementById('openAddBtn').addEventListener('click', openModal);
    document.getElementById('saveExpenseBtn').addEventListener('click', handleSave);
    document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('prevYearBtn').addEventListener('click', () => { statsYear--; renderStats(); });
    document.getElementById('nextYearBtn').addEventListener('click', () => { statsYear++; renderStats(); });
    
    document.querySelectorAll('.currency-btn').forEach(btn => {
        btn.addEventListener('click', () => { setCurrency(btn.getAttribute('data-currency')); });
    });
    
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => { setTheme(btn.getAttribute('data-theme')); });
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const id = btn.getAttribute('data-tab');
            document.getElementById('trackPanel').classList.toggle('active-panel', id === 'track');
            document.getElementById('statsPanel').classList.toggle('active-panel', id === 'stats');
            if(id === 'stats') renderStats(); else refreshAllDisplays();
        });
    });
    
    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }
    
    // Bootstrap
    loadExpenses();
    loadCurrency();
    loadTheme();
    const today = new Date();
    currentDisplayDate = new Date(today.getFullYear(), today.getMonth(), 1);
    selectedDateStr = today.toISOString().slice(0,10);
    refreshAllDisplays();
    setTimeout(() => openModal(), 200);
</script>
</body>
</html>
