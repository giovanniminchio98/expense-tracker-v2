<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>💸 Expenses</h1>
    <div id="user-area" class="user-area hidden">
      <img id="user-photo" class="avatar" alt="" referrerpolicy="no-referrer" />
      <button id="logout-btn" class="btn btn-ghost">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Login view -->
    <section id="login-view" class="card centered hidden">
      <h2>Welcome</h2>
      <p>Sign in with Google to track your expenses. Your data is stored
         privately in your own Google Drive — no database.</p>
      <button id="login-btn" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.4 0-11.5-5.1-11.5-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.6 6.5 29.1 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.6 6.5 29.1 4.5 24 4.5 16.3 4.5 9.7 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.2 0 9.6-2 13-5.2l-6-5.1c-1.9 1.4-4.3 2.3-7 2.3-5.3 0-9.7-3.1-11.3-7.6l-6.5 5C9.6 39 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4-4 5.2l6 5.1C40.9 35.6 43.5 30.3 43.5 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
        Sign in with Google
      </button>
    </section>

    <!-- Calendar view -->
    <section id="app-view" class="hidden">
      <div class="cal-toolbar">
        <button id="prev-month" class="icon-btn" aria-label="Previous month">‹</button>
        <h2 id="month-label"></h2>
        <button id="next-month" class="icon-btn" aria-label="Next month">›</button>
      </div>
      <div class="month-total">
        <span>This month</span>
        <strong id="month-total-value">€0.00</strong>
      </div>
      <div class="weekdays">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div id="calendar" class="calendar"></div>
      <p id="sync-status" class="sync-status"></p>
    </section>

    <div id="loading" class="centered">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>
  </main>

  <!-- Add-expense modal (dial pad) -->
  <div id="add-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <span id="add-date-label" class="modal-date"></span>
        <button id="add-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div id="amount-display" class="amount-display">€0</div>
      <input id="note-input" class="note-input" type="text" maxlength="60"
             placeholder="What was it for? (optional)" />
      <div class="dialpad">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>
        <button class="key" data-key=".">.</button>
        <button class="key" data-key="0">0</button>
        <button class="key key-del" data-key="del">⌫</button>
      </div>
      <button id="save-expense" class="btn btn-primary btn-block">Add expense</button>
    </div>
  </div>

  <!-- Day-detail modal -->
  <div id="day-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <span id="day-date-label" class="modal-date"></span>
        <button id="day-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <div class="day-total">
        <span>Total</span>
        <strong id="day-total-value">€0.00</strong>
      </div>
      <ul id="day-list" class="expense-list"></ul>
      <p id="day-empty" class="empty hidden">No expenses on this day.</p>
      <button id="day-add" class="btn btn-primary btn-block">+ Add expense</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
