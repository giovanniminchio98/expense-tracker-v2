<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>💸 Expense Tracker</h1>
    <div id="user-area" class="user-area hidden">
      <img id="user-photo" class="avatar" alt="" referrerpolicy="no-referrer" />
      <span id="user-name"></span>
      <button id="logout-btn" class="btn btn-ghost">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Login view -->
    <section id="login-view" class="card centered hidden">
      <h2>Welcome</h2>
      <p>Sign in with Google to track your expenses. Your data is stored
         privately in your own Google Drive — we don't run a database.</p>
      <button id="login-btn" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.4 0-11.5-5.1-11.5-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.6 6.5 29.1 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.6 6.5 29.1 4.5 24 4.5 16.3 4.5 9.7 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5.2 0 9.6-2 13-5.2l-6-5.1c-1.9 1.4-4.3 2.3-7 2.3-5.3 0-9.7-3.1-11.3-7.6l-6.5 5C9.6 39 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4-4 5.2l6 5.1C40.9 35.6 43.5 30.3 43.5 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
        Sign in with Google
      </button>
    </section>

    <!-- App view -->
    <section id="app-view" class="hidden">
      <div class="summary card">
        <div class="summary-item">
          <span class="summary-label">Total spent</span>
          <span id="total" class="summary-value">$0.00</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Entries</span>
          <span id="count" class="summary-value">0</span>
        </div>
      </div>

      <form id="expense-form" class="card">
        <h2>Add expense</h2>
        <div class="form-row">
          <label>Amount
            <input id="amount" type="number" step="0.01" min="0" required placeholder="0.00" />
          </label>
          <label>Category
            <select id="category">
              <option>Food</option>
              <option>Transport</option>
              <option>Housing</option>
              <option>Entertainment</option>
              <option>Health</option>
              <option>Shopping</option>
              <option>Other</option>
            </select>
          </label>
          <label>Date
            <input id="date" type="date" required />
          </label>
        </div>
        <label>Description
          <input id="description" type="text" maxlength="120" placeholder="Optional note" />
        </label>
        <button type="submit" class="btn btn-primary">Add</button>
      </form>

      <div class="card">
        <div class="list-header">
          <h2>Expenses</h2>
          <span id="sync-status" class="sync-status"></span>
        </div>
        <ul id="expense-list" class="expense-list"></ul>
        <p id="empty-state" class="empty hidden">No expenses yet. Add your first one above.</p>
      </div>
    </section>

    <div id="loading" class="centered">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
